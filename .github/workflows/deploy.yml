name: Build and Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.21"

      - name: Build
        run: CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -o bot-restarter .

      - name: Deploy
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} "rm -f /opt/bot-restarter/bot-restarter"
          scp -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no bot-restarter ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/opt/bot-restarter/
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} "chmod +x /opt/bot-restarter/bot-restarter && sudo /usr/bin/systemctl restart bot-restarter && sleep 2 && sudo /usr/bin/systemctl status bot-restarter --no-pager"
          rm -f ~/.ssh/deploy_key
